services:
  - type: web
    name: desculpaai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    port: 8080
    
    # Auto-deploy em qualquer push
    autoDeploy: true
    
    # Environment variables
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: PORT
        value: 8080
      
      # ⚠️  DATABASE CREDENTIALS DEVEM SER CONFIGURADAS NO RENDER DASHBOARD ⚠️
      # - SPRING_DATASOURCE_URL: Get from your Aiven/external MySQL host
      # - SPRING_DATASOURCE_USERNAME: Get from your Aiven/external MySQL
      # - SPRING_DATASOURCE_PASSWORD: Get from your Aiven/external MySQL
      
      # Exemplo:
      # SPRING_DATASOURCE_URL=jdbc:mysql://mysql-xxxx.aivencloud.com:3306/desculpaai
      # SPRING_DATASOURCE_USERNAME=avnadmin
      # SPRING_DATASOURCE_PASSWORD=your_password_here
