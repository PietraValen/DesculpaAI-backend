services:
  - type: web
    name: desculpaai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    port: 8080
    
    # Auto-deploy em qualquer push
    autoDeploy: true
    
    # Environment variables
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: PORT
        value: 8080
      
      # Database credentials (sincronize com seu banco MySQL)
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: desculpaai-mysql
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: desculpaai-mysql
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: desculpaai-mysql
          property: password

  # MySQL Database Service
  - type: mysql
    name: desculpaai-mysql
    ipAllowList: []
    plan: starter
    mysqlVersion: "8.0"
