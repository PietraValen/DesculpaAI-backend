# Application properties para produção (Render)
# Integre essas configs em seu application-prod.properties

# Server configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.dialect.storage_engine=innodb
spring.jpa.properties.hibernate.id.db_structure_catalog=
spring.jpa.database=mysql

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# MySQL specific configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.jpa.properties.hibernate.use_nationalized_character_data=false

# Logging
logging.level.root=INFO
logging.level.com.hackathon=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# CORS
web.cors.allowed-origins=*
web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
web.cors.allowed-headers=*
web.cors.allow-credentials=true
web.cors.max-age=3600

# Application info
spring.application.name=DesculpaAI Backend
spring.application.version=0.0.1-SNAPSHOT
info.app.name=DesculpaAI Backend
info.app.description=Aplicação de Geração de Alibis com IA
info.app.version=@project.version@

# Encoding
spring.web.resources.add-mappings=true
spring.mvc.throw-exception-if-no-handler-found=true
