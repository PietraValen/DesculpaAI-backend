####################################
# Configurações de Produção
####################################

####################################
# Configurações do Banco de Dados - MySQL
####################################
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/desculpaai?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

####################################
# MySQL-Specific Hibernate Properties
####################################
spring.jpa.properties.hibernate.id.new_generator_mappings=false
spring.jpa.properties.hibernate.use_nationalized_character_data=false

####################################
# Connection Pool (HikariCP)
####################################
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

####################################
# Configurações de Logging
####################################
logging.level.root=WARN
logging.level.com.hackathon.DesculpaAI=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

####################################
# Swagger/OpenAPI
####################################
springdoc.swagger-ui.enabled=false

####################################
# Devtools
####################################
spring.devtools.restart.enabled=false

####################################
# Server Configuration
####################################
server.port=${PORT:8080}
server.servlet.context-path=/api
spring.devtools.livereload.enabled=false

####################################
# Performance
####################################
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
