####################################
# Configurações para Render - MySQL
####################################

####################################
# Configurações do Banco de Dados - MySQL 8.0
####################################
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

####################################
# Configurações do Hibernate/JPA - MySQL 8.0
####################################
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

####################################
# MySQL-Specific Hibernate Properties
####################################
spring.jpa.properties.hibernate.dialect.storage_engine=innodb
spring.jpa.properties.hibernate.use_nationalized_character_data=false

####################################
# Disable PostgreSQL-specific sequence extraction (CRITICAL FOR MYSQL)
####################################
spring.jpa.properties.hibernate.id.new_generator_mappings=false
spring.jpa.properties.hibernate.id.optimizer.pooled.preferred=pooled
spring.jpa.properties.hibernate.id.sequence_store_logo_name=false

####################################
# Disable sequence metadata extraction completely
####################################
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true

####################################
# Connection Pool (HikariCP)
####################################
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.auto-commit=true

####################################
# MySQL JDBC Connection Parameters
####################################
spring.datasource.url=${SPRING_DATASOURCE_URL}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true

####################################
# Configurações de Logging
####################################
logging.level.root=WARN
logging.level.com.hackathon.DesculpaAI=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.data=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

####################################
# Swagger/OpenAPI
####################################
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

####################################
# Actuator & Health Checks
####################################
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

####################################
# Server Configuration
####################################
server.port=${PORT:8080}
server.servlet.context-path=/api
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.ssl.enabled=false

####################################
# Spring Boot
####################################
spring.application.name=DesculpaAI-Backend
spring.banner.location=classpath:banner.txt
